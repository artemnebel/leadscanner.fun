<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1EHSVC4QBJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1EHSVC4QBJ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Lead Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png"/>
    <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon-48.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon-180.png"/>
    <link rel="icon" href="/favicon.ico"/>
    <link rel="shortcut icon" href="/favicon.ico"/>
    <link rel="stylesheet" href="/static/style.css?v={{ version }}"/>
</head>
<body class="page">
    <div id="crt-overlay"></div>

    <header id="top-bar">
        <div id="logo">
            <span id="logo-blink">█</span>
            <a href="/" style="text-decoration:none"><span id="logo-text">&gt;_ LEAD_SCANNER.EXE</span></a>
        </div>
    </header>

    <nav id="main-nav">
        <div class="nav-left">
            <a href="/" class="nav-link">[ HOME ]</a>
            <a href="/about" class="nav-link">[ ABOUT ]</a>
            <a href="/how-it-works" class="nav-link">[ HOW_IT_WORKS ]</a>
            <a href="/resources" class="nav-link">[ RESOURCES ]</a>
        </div>
        <div class="nav-right">
            <a href="/contact" class="nav-link">[ CONTACT ]</a>
            <a href="/pricing" class="nav-link">[ PRICING ]</a>
            <a href="/login" class="nav-link" id="nav-auth-link">[ LOGIN ]</a>
        </div>
    </nav>

    <main class="page-content">
        <h1 class="page-title">&gt; RESET_PASSWORD.EXE</h1>

        <div class="auth-box">
            <div id="auth-error" class="auth-error" style="display:none"></div>
            <div id="auth-success" class="auth-error" style="display:none;border-color:var(--green);color:var(--green)"></div>
            <div id="invalid-token" style="display:none">
                <p style="color:var(--amber);">&gt; ERR: Invalid or missing reset token.</p>
                <p class="auth-footer"><a href="/forgot-password">[ REQUEST NEW LINK ]</a></p>
            </div>

            <form id="reset-form" class="auth-form" style="display:none">
                <div class="form-group">
                    <label class="form-label">&gt; NEW PASSWORD</label>
                    <input type="password" id="password" class="form-input" placeholder="min. 8 characters" required autocomplete="new-password" minlength="8">
                </div>
                <div class="form-group">
                    <label class="form-label">&gt; CONFIRM PASSWORD</label>
                    <input type="password" id="confirm" class="form-input" placeholder="repeat password" required autocomplete="new-password" minlength="8">
                </div>
                <button type="submit" class="auth-btn" id="submit-btn">[ SET NEW PASSWORD ]</button>
            </form>

            <p class="auth-footer" id="back-link" style="display:none"><a href="/login">[ BACK TO LOGIN ]</a></p>
        </div>
    </main>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('invalid-token').style.display = 'block';
        } else {
            document.getElementById('reset-form').style.display = 'block';
            document.getElementById('back-link').style.display = 'block';
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn   = document.getElementById('submit-btn');
            const errEl = document.getElementById('auth-error');
            const okEl  = document.getElementById('auth-success');
            errEl.style.display = 'none';
            okEl.style.display  = 'none';

            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm').value;

            if (password !== confirm) {
                errEl.textContent = '> ERR: Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            btn.textContent = '[ UPDATING... ]';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password }),
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('reset-form').style.display = 'none';
                    okEl.textContent = '> Password updated. You can now log in.';
                    okEl.style.display = 'block';
                    document.getElementById('back-link').innerHTML = '<a href="/login">[ GO TO LOGIN ]</a>';
                } else {
                    errEl.textContent = '> ERR: ' + (data.detail || 'Reset failed.');
                    errEl.style.display = 'block';
                    btn.textContent = '[ SET NEW PASSWORD ]';
                    btn.disabled = false;
                }
            } catch {
                errEl.textContent = '> ERR: Network error.';
                errEl.style.display = 'block';
                btn.textContent = '[ SET NEW PASSWORD ]';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
