<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1EHSVC4QBJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1EHSVC4QBJ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Lead Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png"/>
    <link rel="icon" type="image/png" sizes="48x48" href="/static/favicon-48.png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon-180.png"/>
    <link rel="icon" href="/favicon.ico"/>
    <link rel="shortcut icon" href="/favicon.ico"/>
    <link rel="stylesheet" href="/static/style.css?v={{ version }}"/>
</head>
<body class="page">
    <div id="crt-overlay"></div>

    <header id="top-bar">
        <div id="logo">
            <span id="logo-blink">█</span>
            <a href="/" style="text-decoration:none"><span id="logo-text">&gt;_ LEAD_SCANNER.EXE</span></a>
        </div>
    </header>

    <nav id="main-nav">
        <div class="nav-left">
            <a href="/" class="nav-link">[ HOME ]</a>
            <a href="/about" class="nav-link">[ ABOUT ]</a>
            <a href="/how-it-works" class="nav-link">[ HOW_IT_WORKS ]</a>
            <a href="/resources" class="nav-link">[ RESOURCES ]</a>
        </div>
        <div class="nav-right">
            <a href="/contact" class="nav-link">[ CONTACT ]</a>
            <a href="/pricing" class="nav-link">[ PRICING ]</a>
            <a href="/login" class="nav-link" id="nav-auth-link">[ LOGIN ]</a>
        </div>
    </nav>

    <main class="page-content">
        <h1 class="page-title">&gt; FORGOT_PASSWORD.EXE</h1>

        <div class="auth-box">
            <p class="auth-intro">Enter your email and we'll send you a reset link.</p>

            <div id="auth-error" class="auth-error" style="display:none"></div>
            <div id="auth-success" class="auth-error" style="display:none;border-color:var(--green);color:var(--green)"></div>

            <form id="forgot-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">&gt; EMAIL</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>
                <button type="submit" class="auth-btn" id="submit-btn">[ SEND RESET LINK ]</button>
            </form>

            <p class="auth-footer"><a href="/login">[ BACK TO LOGIN ]</a></p>
        </div>
    </main>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('auth-error');
            const okEl  = document.getElementById('auth-success');
            errEl.style.display = 'none';
            okEl.style.display  = 'none';
            btn.textContent = '[ SENDING... ]';
            btn.disabled = true;

            const email = document.getElementById('email').value;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                if (res.ok) {
                    okEl.textContent = '> Reset link sent. Check your inbox (and spam folder).';
                    okEl.style.display = 'block';
                    document.getElementById('forgot-form').style.display = 'none';
                } else {
                    const data = await res.json();
                    errEl.textContent = '> ERR: ' + (data.detail || 'Something went wrong.');
                    errEl.style.display = 'block';
                    btn.textContent = '[ SEND RESET LINK ]';
                    btn.disabled = false;
                }
            } catch {
                errEl.textContent = '> ERR: Network error.';
                errEl.style.display = 'block';
                btn.textContent = '[ SEND RESET LINK ]';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
